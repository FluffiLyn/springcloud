server:
  port: 9002
spring:
  boot:
    admin:
      client:
        url: http://localhost:7779
  application:
    name: myshop-web
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8888/eureka
  instance:
    prefer-ip-address: true
feign:
  hystrix:
    enabled: true
management:
  endpoints:
    web:
      exposure:
        include: "*"
