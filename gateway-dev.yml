server:
  port: 8222
spring:
  application:
    name: myshop-gateway
  zipkin:
    base-url: http://localhost:9042
    sender:
      type: web
  sleuth:
    sampler:
      probability: 1.0
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8888/eureka
  instance:
    prefer-ip-address: true
zuul:
  routes:
    myshop-user:
      path: /myshop-user/**
      serviceId: myshop-user
    myshop-web:
      path: /myshop-web/**
      serviceId: myshop-web
  SendErrorFilter:
    error:
      disable: true
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - traceId=%X{traceId:-} spanId=%X{spanId:-} - %msg%n"
